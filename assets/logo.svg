<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="moneyfrisk">
  <rect width="128" height="128" rx="28" fill="#0D0F12"/>
  <rect x="0.5" y="0.5" width="127" height="127" rx="27.5" stroke="#34D399" stroke-opacity="0.18"/>
  <!-- a coin -->
  <circle cx="56" cy="54" r="26" fill="none" stroke="#3A4048" stroke-width="5"/>
  <!-- dollar sign on the coin -->
  <path d="M56 40 v28 M62 45 q-6-4-12-1 q-5 3 0 7 q5 3 12 5 q5 3 0 7 q-6 3-12-1" fill="none" stroke="#34D399" stroke-width="4" stroke-linecap="round"/>
  <!-- the float-drift tail (red): ...0004 leaking off the value -->
  <text x="78" y="58" font-family="ui-monospace,Menlo,monospace" font-size="11" fill="#F87171">…04</text>
  <!-- magnifier frisking the drift -->
  <circle cx="80" cy="78" r="20" fill="none" stroke="#34D399" stroke-width="6"/>
  <line x1="95" y1="93" x2="106" y2="104" stroke="#34D399" stroke-width="8" stroke-linecap="round"/>
</svg>
